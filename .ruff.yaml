# .ruff.yaml

# Целевая версия Python
target-version: "py314"

line-length: 100

exclude:
  - .venv
  - venv
  - __pycache__
  - migrations
  - static
  - media
  - node_modules
  - .git

format:
  quote-style: "double"
  indent-style: "space"
  line-ending: "auto"

lint:
  select:
    - "E"    # pycodestyle errors
    - "W"    # pycodestyle warnings
    - "F"    # pyflakes
    - "I"    # isort
    - "B"    # flake8-bugbear
    - "C4"   # flake8-comprehensions
    - "DJ"   # flake8-django
    - "S"    # bandit
    - "T20"  # flake8-print
    - "SIM"  # flake8-simplify
    - "ARG"  # flake8-unused-arguments
    - "RET"  # flake8-return
    - "PT"   # flake8-pytest-style

  ignore:
    - "D100"  # Missing docstring in public module
    - "D104"  # Missing docstring in public package
    - "D107"  # Missing docstring in __init__
    - "D400"  # First line should end with a period
    - "W503"  # Line break before binary operator
    - "B008"  # Do not perform function calls in argument defaults

  # Максимальная сложность функций (max-complexity = 10)
  mccabe:
    max-complexity: 10

  # Настройки для конкретных файлов (per-file-ignores)
  per-file-ignores:
    # __init__.py файлы
    "*/__init__.py":
      - "F401"  # Неиспользуемые импорты разрешены
    
    # Фикстуры для тестов
    "tests/fixtures/__init__.py":
      - "F401"  # Неиспользуемые импорты
      - "F403"  # Импорт * разрешен
    
    # conftest.py для pytest
    "tests/conftest.py":
      - "F401"  # Неиспользуемые импорты
      - "F403"  # Импорт * разрешен
    
    # Миграции Django
    "*/migrations/*.py":
      - "E501"  # Длинные строки
      - "F401"  # Неиспользуемые импорты
      - "F403"  # Импорт *
      - "DJ01"  # on_delete warnings
    
    # Файлы настроек
    "config/settings.py":
      - "E501"  # Длинные строки
      - "B008"  # Вызовы функций в defaults
    
    "manage.py":
      - "E501"  # Длинные строки

  # Настройки isort (замена isort из вашего конфига)
  isort:
    # Известные first-party модули (known_first_party = app)
    known-first-party:
      - "app"
      - "config"
      - "apps"
      - "authentication"
    
    # Известные third-party библиотеки
    known-third-party:
      - "django"
      - "rest_framework"
      - "drf_spectacular"
      - "django_filters"
      - "celery"
    
    # Количество строк после импортов (lines_after_imports = 2)
    lines-after-imports: 2
    
    # Длина строки (line_length = 100)
    line-length: 100
    
    # Режим многострочного вывода (multi_line_output = 3)
    # 3 - это режим с вертикальной сеткой и запятыми
    force-sort-within-sections: true
    order-by-type: false
    combine-as-imports: true
    
    # Включать завершающую запятую (include_trailing_comma = true)
    combine-as-imports: true
    
    # Пропускаемые директории (skip = .venv, venv)
    skip:
      - .venv
      - venv
      - migrations
      - __pycache__
    
    # Порядок секций
    section-order:
      - "future"
      - "standard-library"
      - "third-party"
      - "first-party"
      - "local-folder"

  # Настройки flake8-django
  flake8-django:
    django_settings_module: "config.settings"

  # Настройки flake8-annotations
  flake8-annotations:
    allow-star-arg-any: true
    mypy-init-return: true
    suppress-none-returning: true

# Неизменяемые вызовы (extend-immutable-calls из flake8)
# В Ruff это настраивается через flake8-bugbear
lint.flake8-bugbear:
  extend-immutable-calls:
    - "fastapi.Depends"
    - "fastapi.params.Depends"
    - "Depends"
    - "django.conf.settings"
    - "os.getenv"

# Дополнительные настройки для совместимости с pep8 разделом
# (Ruff включает эти проверки по умолчанию)
lint.pycodestyle:
  max-doc-length: 100
  ignore-overlong-task-comments: false